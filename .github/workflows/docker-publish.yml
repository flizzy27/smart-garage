name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      channel:
        description: "Image channel to publish"
        required: true
        default: development
        type: choice
        options:
          - development
          - stable

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Setup database
        run: |
          mkdir -p ../data
          npx prisma migrate deploy
          npx prisma db seed
        env:
          DATABASE_URL: file:../data/smart-garage.db
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          DATABASE_URL: file:../data/smart-garage.db
          UPLOAD_DIR: ../data/uploads

  publish-development:
    name: Push development image
    needs: validate
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.channel == 'development')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: APP_VERSION=${{ github.sha }}
          tags: ghcr.io/flizzy27/smart-garage:development
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-stable:
    name: Push stable image
    needs: validate
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.channel == 'stable')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "semver=$(cat VERSION)" >> "$GITHUB_OUTPUT"
            echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: APP_VERSION=${{ steps.version.outputs.semver }}
          tags: |
            ghcr.io/flizzy27/smart-garage:latest
            ghcr.io/flizzy27/smart-garage:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
