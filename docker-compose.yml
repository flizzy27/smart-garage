# Pull the published image (recommended). To build locally: docker compose up -d --build
services:
  smart-garage:
    image: ghcr.io/flizzy27/smart-garage:latest
    container_name: smart-garage
    ports:
      - "3000:3000"
    volumes:
      - smart-garage-data:/data
    environment:
      - DATABASE_URL=file:/data/smart-garage.db
      - UPLOAD_DIR=/data/uploads
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-25}
      - MAX_IMAGE_SIZE_MB=${MAX_IMAGE_SIZE_MB:-10}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  smart-garage-data:
